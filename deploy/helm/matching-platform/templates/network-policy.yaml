apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "matching-platform.fullname" . }}-contestant-isolation
  labels:
    app: contestant-runner
spec:
  podSelector:
    matchLabels:
      role: contestant
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from load generators (bots) to port 8080 (trading API)
    - from:
        - podSelector:
            matchLabels:
              role: load-generator
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus scrapers to port 2112 (telemetry)
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 2112
  egress:
    # Deny all egress traffic (empty list of allowed destinations)
    # The contestant matching engine needs no external network connectivity.
    []
