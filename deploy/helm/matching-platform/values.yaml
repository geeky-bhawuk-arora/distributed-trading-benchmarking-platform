# Global values for matching-platform
replicaCount: 1

image:
  repository: distributed-trading-platform
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

submissionService:
  port: 8181
  replicaCount: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 256Mi

controller:
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  host: "redis.default.svc.cluster.local"
  port: 6379

timescaledb:
  host: "timescaledb.default.svc.cluster.local"
  port: 5432
